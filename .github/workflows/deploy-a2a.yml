name: Deploy A2A to Cloud Run

# ═══════════════════════════════════════════════════════════════════════════
# DISABLED BY DEFAULT — read before enabling
# ═══════════════════════════════════════════════════════════════════════════
#
# This workflow deploys the distributed A2A architecture:
#   - 3 Cloud Run SERVICES  (researcher, writer, publisher — scale-to-zero)
#   - 1 Cloud Run JOB       (orchestrator — triggered daily by Cloud Scheduler)
#
# It is manual-only (workflow_dispatch) by default so that a normal `git push`
# deploys ONLY the monolith (deploy-monolith.yml). To deploy A2A, go to:
#   GitHub Actions → "Deploy A2A to Cloud Run" → Run workflow → type "deploy"
#
# TO ENABLE AUTO-DEPLOY FOR A2A ON PUSH:
#   1. Uncomment the `push:` block below.
#   2. Optionally comment out the `workflow_dispatch:` block if you only want
#      push-based deploys.
#   WARNING: if both workflows have `push:` triggers, BOTH deploy on every
#   push. Only do this intentionally.
#
# PREREQUISITES (one-time GCP setup — see PLAYBOOK.md Part D):
#   - Artifact Registry repo named "digital-worker" (update REPOSITORY below)
#   - 12 secrets in Secret Manager (same names used by the monolith)
#   - Service account with required IAM roles
#   - Workload Identity Federation pool + provider bound to your GitHub repo
#
# ═══════════════════════════════════════════════════════════════════════════

on:
  # ── MANUAL TRIGGER (default) ────────────────────────────────────────────
  # Deploy on demand from the GitHub Actions tab. Must type "deploy" to confirm.
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm A2A deployment'
        required: true

  # ── AUTO TRIGGER ON PUSH (disabled by default) ─────────────────────────
  # Uncomment to auto-deploy A2A when a2a/** changes on main.
  #
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'a2a/**'
  #     - '.github/workflows/deploy-a2a.yml'

# ─── Update these to match your GCP project ───────────────────────────────
env:
  PROJECT_ID:   gen-lang-client-0230396996
  PROJECT_NUM:  487905766954
  REGION:       us-central1
  REPOSITORY:   digital-worker          # Artifact Registry repo for A2A images
  SERVICE_ACCOUNT: trend-agent-runner@gen-lang-client-0230396996.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/487905766954/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SECRETS: "GOOGLE_CLOUD_PROJECT=GOOGLE_CLOUD_PROJECT:latest,GOOGLE_CLOUD_LOCATION=GOOGLE_CLOUD_LOCATION:latest,GOOGLE_GENAI_USE_VERTEXAI=GOOGLE_GENAI_USE_VERTEXAI:latest,VERTEX_IMAGEN_LOCATION=VERTEX_IMAGEN_LOCATION:latest,IMAGE_BUCKET=IMAGE_BUCKET:latest,BLOGGER_CLIENT_ID=BLOGGER_CLIENT_ID:latest,BLOGGER_CLIENT_SECRET=BLOGGER_CLIENT_SECRET:latest,BLOGGER_REFRESH_TOKEN=BLOGGER_REFRESH_TOKEN:latest,BLOGGER_BLOG_ID=BLOGGER_BLOG_ID:latest,FACEBOOK_PAGE_ID=FACEBOOK_PAGE_ID:latest,FACEBOOK_PAGE_ACCESS_TOKEN=FACEBOOK_PAGE_ACCESS_TOKEN:latest,FACEBOOK_API_VERSION=FACEBOOK_API_VERSION:latest"

jobs:
  # ── Guard: confirm intent before any cloud resources are touched ─────────
  check-confirm:
    if: github.event_name == 'push' || github.event.inputs.confirm == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deploy intent
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                "${{ github.event.inputs.confirm }}" != "deploy" ]]; then
            echo "Type 'deploy' in the confirm box to proceed."
            exit 1
          fi
          echo "Deploy confirmed."

  deploy:
    needs: check-confirm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: a2a

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.8
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build all four images (parallel) ──────────────────────────────
      - name: Build and push all images
        run: |
          BASE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}
          SHA=${{ github.sha }}

          build_push() {
            local name=$1 ctx=$2
            docker build -t "$BASE/$name:$SHA" "$ctx"
            docker push "$BASE/$name:$SHA"
          }

          build_push researcher-agent agents/researcher_agent &
          build_push writer-agent     agents/writer_agent     &
          build_push publisher-agent  agents/publisher_agent  &
          build_push orchestrator     orchestrator            &
          wait
          echo "All images pushed."

      # ── Deploy the three specialist Cloud Run SERVICES ─────────────────
      - name: Deploy specialist services
        run: |
          BASE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}
          SHA=${{ github.sha }}

          deploy_svc() {
            local name=$1 img="$BASE/$name:$SHA"
            if gcloud run services describe "$name" --region=${{ env.REGION }} &>/dev/null; then
              gcloud run services update "$name" \
                --image="$img" --region=${{ env.REGION }} \
                --set-secrets="${{ env.SECRETS }}"
            else
              gcloud run services create "$name" \
                --image="$img" --region=${{ env.REGION }} \
                --service-account=${{ env.SERVICE_ACCOUNT }} \
                --no-allow-unauthenticated \
                --memory=1Gi --cpu=1 --timeout=600 \
                --set-secrets="${{ env.SECRETS }}"
            fi
          }

          deploy_svc researcher-agent
          deploy_svc writer-agent
          deploy_svc publisher-agent

          # Capture the HTTPS URLs the orchestrator needs to call each service.
          R_URL=$(gcloud run services describe researcher-agent --region=${{ env.REGION }} --format='value(status.url)')
          W_URL=$(gcloud run services describe writer-agent     --region=${{ env.REGION }} --format='value(status.url)')
          P_URL=$(gcloud run services describe publisher-agent  --region=${{ env.REGION }} --format='value(status.url)')

          # Grant the orchestrator SA permission to invoke each authenticated service.
          for svc in researcher-agent writer-agent publisher-agent; do
            gcloud run services add-iam-policy-binding "$svc" \
              --region=${{ env.REGION }} \
              --member="serviceAccount:${{ env.SERVICE_ACCOUNT }}" \
              --role="roles/run.invoker"
          done

          echo "R_URL=$R_URL" >> $GITHUB_ENV
          echo "W_URL=$W_URL" >> $GITHUB_ENV
          echo "P_URL=$P_URL" >> $GITHUB_ENV

      # ── Deploy the orchestrator Cloud Run JOB ─────────────────────────
      - name: Deploy orchestrator job
        run: |
          BASE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}
          ORCH_IMG=$BASE/orchestrator:${{ github.sha }}
          # Pass service URLs + enable Google ID-token auth for service-to-service calls.
          URLS="RESEARCHER_AGENT_URL=${{ env.R_URL }},WRITER_AGENT_URL=${{ env.W_URL }},PUBLISHER_AGENT_URL=${{ env.P_URL }},USE_CLOUD_RUN_AUTH=true"

          if gcloud run jobs describe trend-orchestrator-job --region=${{ env.REGION }} &>/dev/null; then
            gcloud run jobs update trend-orchestrator-job \
              --image="$ORCH_IMG" --region=${{ env.REGION }} \
              --set-env-vars="$URLS" --set-secrets="${{ env.SECRETS }}"
          else
            gcloud run jobs create trend-orchestrator-job \
              --image="$ORCH_IMG" --region=${{ env.REGION }} \
              --service-account=${{ env.SERVICE_ACCOUNT }} \
              --memory=1Gi --cpu=1 --task-timeout=600 \
              --set-env-vars="$URLS" --set-secrets="${{ env.SECRETS }}"
          fi

      # ── Print Scheduler command for the operator to run once ──────────
      - name: Deployment summary
        run: |
          echo "A2A DEPLOYMENT COMPLETE"
          echo "  researcher-agent : ${{ env.R_URL }}"
          echo "  writer-agent     : ${{ env.W_URL }}"
          echo "  publisher-agent  : ${{ env.P_URL }}"
          echo "  orchestrator job : trend-orchestrator-job"
          echo ""
          echo "Schedule the orchestrator job daily (run once manually):"
          echo "  gcloud scheduler jobs create http a2a-daily \\"
          echo "    --location=${{ env.REGION }} --schedule='0 9 * * *' \\"
          echo "    --time-zone='America/Toronto' \\"
          echo "    --uri='https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ env.PROJECT_ID }}/jobs/trend-orchestrator-job:run' \\"
          echo "    --http-method=POST \\"
          echo "    --oauth-service-account-email=${{ env.SERVICE_ACCOUNT }}"
