name: Deploy A2A Pipeline (manual)

# ─────────────────────────────────────────────────────────────
# This workflow deploys the A2A architecture (3 specialist Cloud Run Services
# + 1 orchestrator Cloud Run Job). It is provided for open-source users who
# want to run the distributed version on Cloud Run.
#
# It is MANUAL-ONLY (workflow_dispatch). It does NOT run on push, so on this
# repository a normal `git push` deploys ONLY the monolith. To deploy A2A,
# open GitHub → Actions → "Deploy A2A Pipeline (manual)" → Run workflow.
#
# Before first use, set the env values below to your own project, and complete
# the one-time GCP setup in PLAYBOOK.md (APIs, Artifact Registry, the 12
# secrets, Workload Identity Federation, and SA roles).
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deploying the A2A pipeline'
        required: true
        default: ''

env:
  PROJECT_ID: gen-lang-client-0230396996
  REGION: us-central1
  REPOSITORY: trend-agent
  SERVICE_ACCOUNT: trend-agent-runner@gen-lang-client-0230396996.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/487905766954/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SECRETS: "GOOGLE_CLOUD_PROJECT=GOOGLE_CLOUD_PROJECT:latest,GOOGLE_CLOUD_LOCATION=GOOGLE_CLOUD_LOCATION:latest,GOOGLE_GENAI_USE_VERTEXAI=GOOGLE_GENAI_USE_VERTEXAI:latest,VERTEX_IMAGEN_LOCATION=VERTEX_IMAGEN_LOCATION:latest,IMAGE_BUCKET=IMAGE_BUCKET:latest,BLOGGER_CLIENT_ID=BLOGGER_CLIENT_ID:latest,BLOGGER_CLIENT_SECRET=BLOGGER_CLIENT_SECRET:latest,BLOGGER_REFRESH_TOKEN=BLOGGER_REFRESH_TOKEN:latest,BLOGGER_BLOG_ID=BLOGGER_BLOG_ID:latest,FACEBOOK_PAGE_ID=FACEBOOK_PAGE_ID:latest,FACEBOOK_PAGE_ACCESS_TOKEN=FACEBOOK_PAGE_ACCESS_TOKEN:latest,FACEBOOK_API_VERSION=FACEBOOK_API_VERSION:latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: a2a

    steps:
      - name: Guard — require explicit confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "::error::You must type 'deploy' in the confirm input to run this workflow."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.8
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ───────────────────────────────────────────────────────────
      # 1. Build & push all four images (build context = a2a/).
      # ───────────────────────────────────────────────────────────
      - name: Build and push images
        run: |
          BASE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}
          SHA=${{ github.sha }}
          for comp in researcher writer publisher; do
            IMG=$BASE/${comp}-agent:$SHA
            docker build -f agents/${comp}_agent/Dockerfile -t $IMG .
            docker push $IMG
          done
          docker build -f orchestrator/Dockerfile -t $BASE/orchestrator:$SHA .
          docker push $BASE/orchestrator:$SHA
          echo "BASE=$BASE" >> $GITHUB_ENV
          echo "SHA=$SHA" >> $GITHUB_ENV

      # ───────────────────────────────────────────────────────────
      # 2. Deploy the three specialist SERVICES, capture their URLs,
      #    set each card's public URL, and grant the orchestrator SA
      #    invoker on each (services are --no-allow-unauthenticated).
      # ───────────────────────────────────────────────────────────
      - name: Deploy specialist services
        run: |
          deploy_service () {  # name  port
            local name="$1" port="$2"
            gcloud run deploy ${name}-agent \
              --image=$BASE/${name}-agent:$SHA \
              --region=${{ env.REGION }} \
              --service-account=${{ env.SERVICE_ACCOUNT }} \
              --memory=1Gi --cpu=1 --port=${port} \
              --no-allow-unauthenticated \
              --set-secrets="${{ env.SECRETS }}"
          }
          deploy_service researcher 8001
          deploy_service writer     8002
          deploy_service publisher  8003

          R_URL=$(gcloud run services describe researcher-agent --region=${{ env.REGION }} --format='value(status.url)')
          W_URL=$(gcloud run services describe writer-agent     --region=${{ env.REGION }} --format='value(status.url)')
          P_URL=$(gcloud run services describe publisher-agent  --region=${{ env.REGION }} --format='value(status.url)')

          gcloud run services update researcher-agent --region=${{ env.REGION }} --update-env-vars="RESEARCHER_PUBLIC_URL=$R_URL"
          gcloud run services update writer-agent     --region=${{ env.REGION }} --update-env-vars="WRITER_PUBLIC_URL=$W_URL"
          gcloud run services update publisher-agent  --region=${{ env.REGION }} --update-env-vars="PUBLISHER_PUBLIC_URL=$P_URL"

          for svc in researcher-agent writer-agent publisher-agent; do
            gcloud run services add-iam-policy-binding "$svc" \
              --region=${{ env.REGION }} \
              --member="serviceAccount:${{ env.SERVICE_ACCOUNT }}" \
              --role="roles/run.invoker"
          done

          echo "R_URL=$R_URL" >> $GITHUB_ENV
          echo "W_URL=$W_URL" >> $GITHUB_ENV
          echo "P_URL=$P_URL" >> $GITHUB_ENV

      # ───────────────────────────────────────────────────────────
      # 3. Deploy the orchestrator JOB, pointed at the service URLs,
      #    with USE_CLOUD_RUN_AUTH=true so it sends ID tokens.
      # ───────────────────────────────────────────────────────────
      - name: Deploy orchestrator job
        run: |
          ORCH_IMG=$BASE/orchestrator:$SHA
          URLS="RESEARCHER_AGENT_URL=$R_URL,WRITER_AGENT_URL=$W_URL,PUBLISHER_AGENT_URL=$P_URL,USE_CLOUD_RUN_AUTH=true"
          if gcloud run jobs describe trend-orchestrator-job --region=${{ env.REGION }} &>/dev/null; then
            gcloud run jobs update trend-orchestrator-job \
              --image=$ORCH_IMG --region=${{ env.REGION }} \
              --set-env-vars="$URLS" --set-secrets="${{ env.SECRETS }}"
          else
            gcloud run jobs create trend-orchestrator-job \
              --image=$ORCH_IMG --region=${{ env.REGION }} \
              --service-account=${{ env.SERVICE_ACCOUNT }} \
              --memory=1Gi --cpu=1 --task-timeout=600 \
              --set-env-vars="$URLS" --set-secrets="${{ env.SECRETS }}"
          fi

      - name: Confirm deployment
        run: |
          echo "✅ Specialists: $R_URL | $W_URL | $P_URL"
          echo "✅ Orchestrator job: trend-orchestrator-job in ${{ env.REGION }}"
          echo "Trigger a run: gcloud run jobs execute trend-orchestrator-job --region=${{ env.REGION }}"
